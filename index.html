
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9:16 Image Framer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ece9e6 0%, #ffffff 100%);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            overscroll-behavior-y: contain; 
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            color: #111;
        }

        .subtitle {
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            font-weight: 600;
            /* Instagram-style gradient text */
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: lowercase;
        }

        .controls {
            /* Glassmorphism effect */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"] {
            font-family: inherit;
            font-size: 0.9rem;
        }

        input[type="file"]::file-selector-button {
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 50px;
            border: none;
            background-color: #f0f0f5;
            color: #333;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #e4e4eb;
        }

        input[type="color"] {
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 0;
            overflow: hidden;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        .btn {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        #autoColorBtn {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
        }

        #autoColorBtn:hover {
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.4);
            transform: translateY(-2px);
        }

        #downloadBtn {
            background: #111;
            color: white;
        }

        #downloadBtn:hover {
            background: #333;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .canvas-container {
            padding: 15px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        canvas {
            max-height: 65vh;
            background-color: #f9f9f9;
            border-radius: 12px;
            touch-action: none; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>IGBG</h2>
        <p class="subtitle">create your perfect insta story with us ✨</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="imageUpload">1. Upload Pic</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label for="bgColor">2. Background colour</label>
            <input type="color" id="bgColor" value="#000000">
        </div>

        <button id="autoColorBtn" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            Auto-Detect colour
        </button>
        
        <button id="downloadBtn" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Download
        </button>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageUpload = document.getElementById('imageUpload');
        const bgColorPicker = document.getElementById('bgColor');
        const downloadBtn = document.getElementById('downloadBtn');
        const autoColorBtn = document.getElementById('autoColorBtn');

        const CANVAS_WIDTH = 1080;
        const CANVAS_HEIGHT = 1920;

        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        let uploadedImage = null;
        let customScale = 1; 
        let initialPinchDistance = 0; 

        function renderCanvas() {
            ctx.fillStyle = bgColorPicker.value;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (uploadedImage) {
                const baseScale = Math.min(
                    CANVAS_WIDTH / uploadedImage.width, 
                    CANVAS_HEIGHT / uploadedImage.height
                );
                const finalScale = baseScale * customScale;
                const newWidth = uploadedImage.width * finalScale;
                const newHeight = uploadedImage.height * finalScale;
                const x = (CANVAS_WIDTH - newWidth) / 2;
                const y = (CANVAS_HEIGHT - newHeight) / 2;
                ctx.drawImage(uploadedImage, x, y, newWidth, newHeight);
            }
        }

        function getDistance(touch1, touch2) {
            return Math.hypot(touch1.clientX - touch2.clientX, touch1.clientY - touch2.clientY);
        }

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDistance = getDistance(e.touches[0], e.touches[1]);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && uploadedImage) {
                e.preventDefault(); 
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const distanceRatio = currentDistance / initialPinchDistance;
                customScale *= distanceRatio;
                customScale = Math.max(0.1, customScale); 
                initialPinchDistance = currentDistance; 
                renderCanvas();
            }
        });

        canvas.addEventListener('wheel', (e) => {
            if (uploadedImage) {
                e.preventDefault(); 
                const zoomSensitivity = 0.001;
                customScale -= e.deltaY * zoomSensitivity;
                customScale = Math.max(0.1, customScale); 
                renderCanvas();
            }
        });

        imageUpload.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        uploadedImage = img;
                        customScale = 1; 
                        renderCanvas(); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        bgColorPicker.addEventListener('input', renderCanvas);

        autoColorBtn.addEventListener('click', () => {
            if (!uploadedImage) return alert("Please upload an image first!");
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 50; 
            tempCanvas.height = 50;
            tempCtx.drawImage(uploadedImage, 0, 0, tempCanvas.width, tempCanvas.height);
            const data = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
            let r = 0, g = 0, b = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
                r += data[i]; g += data[i + 1]; b += data[i + 2]; count++;
            }
            r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
            const hexColor = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
            bgColorPicker.value = hexColor;
            renderCanvas();
        });

        downloadBtn.addEventListener('click', () => {
            if (!uploadedImage) return alert("Please upload an image first!");
            const link = document.createElement('a');
            link.download = '9x16-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        renderCanvas();
    </script>
</body>
</html>
